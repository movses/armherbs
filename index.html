<!DOCTYPE html>
<html>

	<head>
		<meta charset="utf-8"/>
		<title>Armenian Herbs</title>
		<!--link href="http://fonts.googleapis.com/css?family=Cookie|Open+Sans:400,700" rel="stylesheet" /-->
		<link href="style.css" rel="stylesheet" />

	</head>

	<body ng-app="instantSearch" ng-controller="InstantSearchController">

		<div class="bar">
			<input type="text" ng-model="searchString" placeholder="Enter herb name in latin,armenian ..." />
		</div>

		<ul>
			<li ng-repeat="i in items | searchFor:searchString">
				<p>{{i.title}}</p>
				<a href="{{i.url}}"><img ng-src="{{i.image}}" /></a>
			</li>
		</ul>

		<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.0.7/angular.min.js"></script>
		<script src="herbs.js"></script>
	</body>
</html>
